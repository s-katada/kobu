name: Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/web.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: nix develop ..#web --command pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: nix develop ..#web --command pnpm lint

      - name: Typecheck
        run: nix develop ..#web --command pnpm typecheck

      - name: Test
        run: nix develop ..#web --command pnpm test

      - name: Build
        run: nix develop ..#web --command pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kobu-config-dist
          path: web/dist
          if-no-files-found: error

  # Gate-only job: cheap to spin up, and the deploy job is `needs:` it.
  # We can't put `secrets` context in a job-level `if:` (GitHub Actions
  # forbids it), so this is the conventional workaround — read the
  # secret in a step, expose its presence as a job output, and gate
  # the deploy job on the output.
  check-deploy-secrets:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      cloudflare_configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${TOKEN:-}" ] && [ -n "${ACCT:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare Workers deploy skipped: CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID are not configured. Set them under Settings → Secrets and variables → Actions to enable production deployments. CI (lint / typecheck / test / build) still runs on every push."
          fi

  deploy:
    # Only deploy from main; PRs don't get production. (Preview
    # deployments would need a separate wrangler env + a different
    # routing config — left as a follow-up.)
    needs: [ci, check-deploy-secrets]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check-deploy-secrets.outputs.cloudflare_configured == 'true'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: nix develop ..#web --command pnpm install --frozen-lockfile

      - name: Build production bundle
        run: nix develop ..#web --command pnpm build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Requires two repo secrets:
        #   CLOUDFLARE_API_TOKEN     — token scoped to "Edit Workers
        #                              Scripts" + "Workers KV Storage"
        #                              for the kobu-config worker.
        #   CLOUDFLARE_ACCOUNT_ID    — your CF account id.
        # The token is read-only on the build side; revoke from the CF
        # dashboard if it ever leaks.
        run: nix develop ..#web --command pnpm exec wrangler deploy
