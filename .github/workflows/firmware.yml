name: Firmware

on:
  push:
    branches: [main]
    paths:
      - "firmware/rmk/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "firmware/rmk/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/firmware.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build UF2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache cargo target and installed binaries
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/rmk -> target
          # Bust the cache when the nix-pinned toolchain changes.
          # Without this, a `flake.lock` bump can leave cached
          # build-script binaries linking to stale /nix/store paths
          # and fail the build with "No such file or directory".
          key: ${{ hashFiles('flake.lock') }}

      - name: Install cargo-hex-to-uf2
        run: nix develop .#firmware --command cargo install --locked cargo-hex-to-uf2

      - name: Build central and peripheral
        run: |
          nix develop .#firmware --command bash -eux <<'EOF'
          cd firmware/rmk
          cargo build --release --bin central
          cargo build --release --bin peripheral
          cargo objcopy --release --bin central    -- -O ihex central.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral.hex
          cargo hex-to-uf2 --input-path central.hex    --output-path central.uf2    --family nrf52840
          cargo hex-to-uf2 --input-path peripheral.hex --output-path peripheral.uf2 --family nrf52840
          EOF

      # Build a second pair of UF2s with `clear_layout = true` in
      # keyboard.toml's [storage] section. Flashing these once makes
      # the firmware wipe the user keymap (preserving BLE bonds) on the
      # next boot. The web installer's "clean install" pairs this with
      # a second flash of the normal UF2 to leave the device in a
      # functional state where customisation can persist again.
      #
      # We `touch` the source so cargo re-expands the rmk_central /
      # rmk_peripheral proc-macros that embed keyboard.toml — without
      # this, the cached macro output would silently keep
      # clear_layout=false in the produced binary.
      - name: Build factory-reset central and peripheral
        run: |
          nix develop .#firmware --command bash -eux <<'EOF'
          cd firmware/rmk
          sed -i 's/^clear_layout = false$/clear_layout = true/' keyboard.toml
          # Verify the swap actually happened so we don't silently ship
          # an incorrectly-built reset UF2.
          grep -q '^clear_layout = true$' keyboard.toml
          touch src/central.rs src/peripheral.rs
          cargo build --release --bin central
          cargo build --release --bin peripheral
          cargo objcopy --release --bin central    -- -O ihex central-reset.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral-reset.hex
          cargo hex-to-uf2 --input-path central-reset.hex    --output-path central-reset.uf2    --family nrf52840
          cargo hex-to-uf2 --input-path peripheral-reset.hex --output-path peripheral-reset.uf2 --family nrf52840
          # Restore the source tree so subsequent steps see a clean
          # repo. (No-op on ephemeral runners but kept for hygiene.)
          sed -i 's/^clear_layout = true$/clear_layout = false/' keyboard.toml
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: kobu-firmware
          path: |
            firmware/rmk/central.uf2
            firmware/rmk/peripheral.uf2
            firmware/rmk/central-reset.uf2
            firmware/rmk/peripheral-reset.uf2
          if-no-files-found: error

      # Publish a rolling pre-release tagged `firmware-latest` so the
      # kobu-editor web app can fetch the latest UF2 over the public
      # Releases API (no auth needed for public repos). Tag and assets
      # are recreated on every successful main build.
      - name: Publish firmware-latest pre-release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          cd firmware/rmk
          SHA_SHORT=$(git rev-parse --short HEAD)
          DATE_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          NOTES=$(cat <<NOTE
          自動ビルドされた最新版です。

          - Commit: \`${{ github.sha }}\`
          - Built:  ${DATE_UTC}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          通常更新: \`central.uf2\` / \`peripheral.uf2\` を対象の XIAO BLE
          に書き込み (RESET 2 連打 → XIAO-BOOT にドラッグ&ドロップ)。
          既存のキーマップは保持されます。

          工場出荷状態に戻す: \`*-reset.uf2\` を一度焼くと次回起動時に
          storage の keymap がクリアされます。続けて通常版を焼き直すと
          リリース時点のキーマップ + ペアリング情報維持の状態になります
          (詳細は kobu-editor の「クリーンインストール」ボタン)。
          NOTE
          )
          # Delete the previous release (and its moving tag) if present so
          # the next `gh release create` doesn't conflict.
          gh release delete firmware-latest --yes --cleanup-tag || true
          gh release create firmware-latest \
            central.uf2 peripheral.uf2 \
            central-reset.uf2 peripheral-reset.uf2 \
            --title "Latest firmware build ($SHA_SHORT)" \
            --notes "$NOTES" \
            --prerelease \
            --target "$GITHUB_SHA"
