name: Firmware (RMK + ZMK)

# Builds ALL firmwares for kobu in clearly-separated jobs so the Actions UI
# plainly shows which is which:
#   * build-rmk     — the v1 RMK (Rust/Vial) firmware → kobu-rmk-central/peripheral(+-reset).uf2
#   * build-rmk-v2  — the v2 RMK firmware ("kobu2")   → kobu2-rmk-central/peripheral(+-reset).uf2
#   * build-zmk     — the ZMK (zmk-nix) firmware      → kobu-zmk-left/right/reset.uf2
#   * release       — publishes ALL to the rolling `firmware-latest` pre-release
# The web editors consume this: the RMK (Vial) editor installs the RMK assets,
# the ZMK editor installs the ZMK assets, and the ZMK editor's "detailed
# settings" feature dispatches THIS workflow (by filename) with overrides — a
# custom build tweaks ZMK config only, so it runs build-zmk ALONE (both RMK
# jobs are skipped) and the run then carries a single zmk artifact for the
# editor to fetch.

# Custom (web-app) builds set `build_id`; echo it into the run name so the
# ZMK editor's Worker can locate this run when polling (it matches on build_id).
run-name: ${{ inputs.build_id && format('kobu custom ZMK build {0}', inputs.build_id) || 'Firmware (RMK + ZMK)' }}

on:
  push:
    branches: [main]
    paths:
      - "v1/firmware/rmk/**"
      - "v1/firmware/zmk/**"
      - "v2/firmware/rmk/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "v1/firmware/rmk/**"
      - "v1/firmware/zmk/**"
      - "v2/firmware/rmk/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/firmware.yml"
  workflow_dispatch:
    inputs:
      overrides_b64:
        description: "base64 JSON of ZMK editor detailed-settings overrides (from the web app)"
        required: false
        default: ""
        type: string
      build_id:
        description: "opaque id echoed into run-name so the web app can find this run"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  # ── RMK firmware (v1/firmware/rmk, Rust) ──────────────────────────────────
  build-rmk:
    name: Build RMK firmware (Rust / Vial)
    # Custom (web-app override) builds tweak ZMK config only, so skip RMK there:
    # a custom dispatch then runs build-zmk alone and the run carries exactly one
    # (zmk) artifact for the editor to fetch.
    if: ${{ inputs.overrides_b64 == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache cargo target and installed binaries
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: v1/firmware/rmk -> target
          # Bust the cache when the nix-pinned toolchain OR the rmk source
          # patches change. build.rs patches the rmk crate's registry source
          # in place; a stale cache that still holds rmk compiled from an older
          # patch set (keyed only on flake.lock) is exactly what used to make
          # this job fail with "no `KOBU_*` in input_device::battery". Hashing
          # build.rs + keyboard.toml forces a clean registry on any patch change.
          key: ${{ hashFiles('flake.lock', 'v1/firmware/rmk/build.rs', 'v1/firmware/rmk/keyboard.toml') }}

      - name: Install cargo-hex-to-uf2
        run: nix develop .#firmware --command cargo install --locked cargo-hex-to-uf2

      - name: Build RMK central and peripheral
        run: |
          nix develop .#firmware --command bash -eux <<'EOF'
          cd v1/firmware/rmk
          # kobu's build.rs patches REGISTRY SOURCES in place: the `rmk` crate
          # (KOBU_* atomics, conn-param/split tweaks, …), `trouble-host` (PPCP
          # 0x2A04 in the GAP service) and `rmk-macro` (SDC L2CAP queue depth +
          # Mem headroom). But cargo compiles dependencies BEFORE running our
          # build.rs and treats registry sources as immutable, so on a pristine
          # CI registry the first build compiles them UNPATCHED. The fix mirrors
          # the local workflow: one throwaway build to let build.rs apply the
          # (idempotent) patches, then force ALL THREE patched crates to
          # recompile from the now-patched sources, then build for real.
          # (Cleaning only rmk would SILENTLY ship UF2s without PPCP and with
          # the 3-deep SDC queues — no build error, just missing behavior.)
          cargo build --release --bin central || true
          cargo clean --release -p rmk -p trouble-host -p rmk-macro
          cargo build --release --bin central
          cargo build --release --bin peripheral
          cargo objcopy --release --bin central    -- -O ihex central.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral.hex
          cargo hex-to-uf2 --input-path central.hex    --output-path kobu-rmk-central.uf2    --family nrf52840
          cargo hex-to-uf2 --input-path peripheral.hex --output-path kobu-rmk-peripheral.uf2 --family nrf52840
          EOF

      # Build a second pair of UF2s with `clear_layout = true` in
      # keyboard.toml's [storage] section. Flashing these once makes the firmware
      # wipe the user keymap (preserving BLE bonds) on the next boot. We `touch`
      # the source so cargo re-expands the rmk_central / rmk_peripheral
      # proc-macros that embed keyboard.toml. (rmk is already patched+compiled
      # from the step above, so no second clean is needed here.)
      - name: Build RMK factory-reset central and peripheral
        run: |
          nix develop .#firmware --command bash -eux <<'EOF'
          cd v1/firmware/rmk
          sed -i 's/^clear_layout = false$/clear_layout = true/' keyboard.toml
          grep -q '^clear_layout = true$' keyboard.toml
          touch src/central.rs src/peripheral.rs
          cargo build --release --bin central
          cargo build --release --bin peripheral
          cargo objcopy --release --bin central    -- -O ihex central-reset.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral-reset.hex
          cargo hex-to-uf2 --input-path central-reset.hex    --output-path kobu-rmk-central-reset.uf2    --family nrf52840
          cargo hex-to-uf2 --input-path peripheral-reset.hex --output-path kobu-rmk-peripheral-reset.uf2 --family nrf52840
          sed -i 's/^clear_layout = true$/clear_layout = false/' keyboard.toml
          EOF

      - name: Upload RMK firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: kobu-firmware-rmk
          path: |
            v1/firmware/rmk/kobu-rmk-central.uf2
            v1/firmware/rmk/kobu-rmk-peripheral.uf2
            v1/firmware/rmk/kobu-rmk-central-reset.uf2
            v1/firmware/rmk/kobu-rmk-peripheral-reset.uf2
          if-no-files-found: error

  # ── RMK v2 firmware (v2/firmware/rmk, Rust) ───────────────────────────────
  # Same recipe as build-rmk against the v2 tree ("kobu2": +1 bottom pinky key
  # per half on the previously free ROW3 x COL4 intersection, product_id
  # 0x425A). v2's build.rs is kept byte-identical to v1's — both patch the
  # same registry sources in place — so the throwaway-build/clean/rebuild
  # dance below stays correct for either job running on a pristine registry.
  build-rmk-v2:
    name: Build RMK v2 firmware (Rust / Vial)
    # Custom (web-app override) builds tweak ZMK config only — skip, like build-rmk.
    if: ${{ inputs.overrides_b64 == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache cargo target and installed binaries
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: v2/firmware/rmk -> target
          # Same cache-busting rationale as build-rmk: hash the v2 patch set.
          key: ${{ hashFiles('flake.lock', 'v2/firmware/rmk/build.rs', 'v2/firmware/rmk/keyboard.toml') }}

      - name: Install cargo-hex-to-uf2
        run: nix develop .#firmware --command cargo install --locked cargo-hex-to-uf2

      - name: Build RMK v2 central and peripheral
        run: |
          nix develop .#firmware --command bash -eux <<'EOF'
          cd v2/firmware/rmk
          # See build-rmk for why: throwaway build applies the (idempotent)
          # registry patches, then all three patched crates are recompiled
          # from the patched sources before the real build.
          cargo build --release --bin central || true
          cargo clean --release -p rmk -p trouble-host -p rmk-macro
          cargo build --release --bin central
          cargo build --release --bin peripheral
          cargo objcopy --release --bin central    -- -O ihex central.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral.hex
          cargo hex-to-uf2 --input-path central.hex    --output-path kobu2-rmk-central.uf2    --family nrf52840
          cargo hex-to-uf2 --input-path peripheral.hex --output-path kobu2-rmk-peripheral.uf2 --family nrf52840
          EOF

      # clear_layout = true variants — same ritual as build-rmk's factory-reset step.
      - name: Build RMK v2 factory-reset central and peripheral
        run: |
          nix develop .#firmware --command bash -eux <<'EOF'
          cd v2/firmware/rmk
          sed -i 's/^clear_layout = false$/clear_layout = true/' keyboard.toml
          grep -q '^clear_layout = true$' keyboard.toml
          touch src/central.rs src/peripheral.rs
          cargo build --release --bin central
          cargo build --release --bin peripheral
          cargo objcopy --release --bin central    -- -O ihex central-reset.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral-reset.hex
          cargo hex-to-uf2 --input-path central-reset.hex    --output-path kobu2-rmk-central-reset.uf2    --family nrf52840
          cargo hex-to-uf2 --input-path peripheral-reset.hex --output-path kobu2-rmk-peripheral-reset.uf2 --family nrf52840
          sed -i 's/^clear_layout = true$/clear_layout = false/' keyboard.toml
          EOF

      - name: Upload RMK v2 firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: kobu-firmware-rmk-v2
          path: |
            v2/firmware/rmk/kobu2-rmk-central.uf2
            v2/firmware/rmk/kobu2-rmk-peripheral.uf2
            v2/firmware/rmk/kobu2-rmk-central-reset.uf2
            v2/firmware/rmk/kobu2-rmk-peripheral-reset.uf2
          if-no-files-found: error

  # ── ZMK firmware (v1/firmware/zmk, zmk-nix) ───────────────────────────────
  # Produces kobu-zmk-left.uf2 (central + Studio), kobu-zmk-right.uf2 (peripheral)
  # and kobu-zmk-reset.uf2 (settings_reset). Runs on every event — including
  # custom (override) dispatches from the ZMK editor.
  build-zmk:
    name: Build ZMK firmware (zmk-nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Custom (web-app) build: decode the overrides and patch the kobu ZMK
      # config before building so the produced UF2s carry the user's CPI /
      # timing / scroll settings. No-op on normal push / PR builds.
      - name: Apply ZMK editor overrides (custom build)
        if: inputs.overrides_b64
        run: |
          set -euxo pipefail
          echo "${{ inputs.overrides_b64 }}" | base64 -d > /tmp/zmk-overrides.json
          python3 v1/scripts/zmk-apply-overrides.py /tmp/zmk-overrides.json

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # `cp -L` dereferences the nix-store symlinks into a plain dir so
      # upload-artifact / gh release can read them.
      - name: Build ZMK firmware (both halves + settings-reset)
        run: |
          nix build .#zmk-bundle -o result-zmk --print-build-logs
          mkdir -p zmk-out
          cp -L result-zmk/kobu-zmk-left.uf2  zmk-out/kobu-zmk-left.uf2
          cp -L result-zmk/kobu-zmk-right.uf2 zmk-out/kobu-zmk-right.uf2
          cp -L result-zmk/kobu-zmk-reset.uf2 zmk-out/kobu-zmk-reset.uf2

      - name: Upload ZMK firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: kobu-firmware-zmk
          path: |
            zmk-out/kobu-zmk-left.uf2
            zmk-out/kobu-zmk-right.uf2
            zmk-out/kobu-zmk-reset.uf2
          if-no-files-found: error

  # ── Publish the rolling firmware-latest pre-release (RMK v1/v2 + ZMK) ─────
  # Only on normal main builds — NOT on PRs and NOT on custom (overrides) builds
  # (the web app fetches a custom build's UF2 from the run artifact instead, so
  # it must not overwrite the rolling release). Both RMK jobs are skipped on
  # custom builds, so this `needs`-gated job is skipped there too — consistent
  # with the `if` below.
  release:
    name: Publish firmware-latest pre-release
    needs: [build-rmk, build-rmk-v2, build-zmk]
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && inputs.overrides_b64 == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download RMK + ZMK firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish firmware-latest pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)
          DATE_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          # Collect every UF2 from both downloaded artifacts. gh names each
          # release asset by basename, so the asset names (kobu-rmk-central.uf2,
          # kobu-zmk-left.uf2, …) the web editors fetch are preserved regardless
          # of the artifacts' internal directory layout.
          mapfile -t UF2S < <(find dist -name '*.uf2' | sort)
          test "${#UF2S[@]}" -eq 11  # 4 RMK v1 + 4 RMK v2 + 3 ZMK; fail loudly if a build dropped one
          NOTES=$(cat <<NOTE
          自動ビルドされた最新版です（RMK v1 / RMK v2 (kobu2) / ZMK ファームウェア）。

          - Commit: \`${{ github.sha }}\`
          - Built:  ${DATE_UTC}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## RMK ファームウェア（既定）
          通常更新: \`kobu-rmk-central.uf2\` / \`kobu-rmk-peripheral.uf2\` を対象の
          XIAO BLE に書き込み (RESET 2 連打 → XIAO-BOOT にドラッグ&ドロップ)。
          既存のキーマップは保持されます。

          工場出荷状態に戻す: \`kobu-rmk-central-reset.uf2\` /
          \`kobu-rmk-peripheral-reset.uf2\` を一度焼くと次回起動時に storage の keymap
          がクリアされます。続けて通常版を焼き直すとリリース時点のキーマップ +
          ペアリング情報維持の状態になります (詳細は kobu-editor の「クリーンインストール」ボタン)。

          ## RMK v2 ファームウェア（kobu2）
          v2 ハード（小指列最下段 +1 キー/半分、計 40 キー）用。
          \`kobu2-rmk-central.uf2\` / \`kobu2-rmk-peripheral.uf2\` を v1 と同じ手順で
          書き込み。工場出荷リセットは \`kobu2-rmk-central-reset.uf2\` /
          \`kobu2-rmk-peripheral-reset.uf2\`。v1 ハードには v1 用 UF2 を使うこと。

          ## ZMK ファームウェア（移植版）
          \`kobu-zmk-left.uf2\` = 左 (central, ZMK Studio 対応) /
          \`kobu-zmk-right.uf2\` = 右 (peripheral) / \`kobu-zmk-reset.uf2\` =
          settings_reset。RMK と同じ要領で RESET 2 連打 → ドラッグ&ドロップ。
          NOTE
          )
          # Delete the previous release (and its moving tag) if present so the
          # next `gh release create` doesn't conflict.
          gh release delete firmware-latest --yes --cleanup-tag || true
          gh release create firmware-latest \
            "${UF2S[@]}" \
            --title "Latest firmware build ($SHA_SHORT)" \
            --notes "$NOTES" \
            --prerelease \
            --target "$GITHUB_SHA"
