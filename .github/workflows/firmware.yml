name: Firmware

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "firmware/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/firmware.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build UF2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache cargo target and installed binaries
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware -> target

      - name: Install cargo-hex-to-uf2
        run: nix develop --command cargo install --locked cargo-hex-to-uf2

      - name: Build central and peripheral
        run: |
          nix develop --command bash -eux <<'EOF'
          cd firmware
          cargo build --release --bin central
          cargo build --release --bin peripheral
          cargo objcopy --release --bin central    -- -O ihex central.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral.hex
          cargo hex-to-uf2 --input-path central.hex    --output-path central.uf2    --family nrf52840
          cargo hex-to-uf2 --input-path peripheral.hex --output-path peripheral.uf2 --family nrf52840
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: kobu-firmware
          path: |
            firmware/central.uf2
            firmware/peripheral.uf2
          if-no-files-found: error
