# kobu firmware configuration.
#
# Hardware: split keyboard with two XIAO nRF52840 BLE modules (one on each
# thumb-unit PCB). Each side has a 4x5 scan matrix covering 15 main-unit
# switches (rows 0..2) and 4 thumb-unit switches on row 3 at COL0..COL3.
# Row 3 x COL4 has no switch wired on the PCB. The thumb unit's fifth
# silk-labeled switch (SW1) is an MSK-12D19 slide switch acting as the
# physical power cutoff, not a matrix key.
#
# Pin assignments below are derived from the KiCad schematic/PCB for the
# thumb unit. Important: the COL nets are not in XIAO D10..D7 order. The PCB
# connects the logical matrix nets as:
#   D0  (P0_02, pin 1)  -> SDIO   (trackball, bidirectional data)
#   D1  (P0_03, pin 2)  -> SCLK   (trackball clock)
#   D2  (P0_28, pin 3)  -> MOTION (trackball IRQ, active low)
#   D3  (P0_29, pin 4)  -> ROW0
#   D4  (P0_04, pin 5)  -> ROW1
#   D5  (P0_05, pin 6)  -> ROW2
#   D6  (P1_11, pin 7)  -> ROW3
#   D7  (P1_12, pin 8)  -> COL0
#   D8  (P1_13, pin 9)  -> COL1
#   D9  (P1_14, pin 10) -> COL2
#   D10 (P1_15, pin 11) -> COL3
#   NFC2(P0_10, pin 22) -> COL4  (back-side pad, NFC disabled in firmware)
#   NFC1(P0_09, pin 21) -> NCS   (trackball chip-select, back-side pad)
#   USER_LED_G(P0_30)   -> boot indicator LED (common anode, LOW = on)
# FFC cable type (CRITICAL):
#   The thumb-unit J1 pinout is "natural order" (1=+3V3, 2=GND, 3..5=ROW0..2,
#   6..10=COL0..4). The main-unit J1 pinout is the EXACT REVERSE
#   (1=COL4..10=+3V3). For these to mate as designed, the FFC cable must
#   reverse pin mapping (pin 1 of one connector goes to pin 10 of the
#   other). With the wrong cable (straight mapping pin 1 ↔ pin 1) the
#   matrix scans 90° rotated AND P0.10 / P1.15 get shorted to +3V3 / GND
#   respectively, killing two columns and leaving the chip vulnerable.
#
#   Multimeter check (power OFF):
#     main J1 pin 1 (COL4) ↔ thumb J1 pin 10 (COL4) → MUST beep
#     main J1 pin 1 (COL4) ↔ thumb J1 pin 1  (+3V3) → must NOT beep
#   If the second test beeps, swap to a reverse-mapping FFC ("opposite-
#   contact" / "Type 2"). No firmware change can compensate cleanly for
#   the wrong cable since two MCU pins are clamped to power rails.
#
# Diode direction (CONFIRMED 2026-05-12):
#   Both main and thumb units use diodes installed PER SILKSCREEN —
#   that is, the band/cathode marking matches the silkscreen K mark,
#   so the ANODE is on the /ROW net (matching the KiCad netlist).
#
#   This means the matrix MUST be scanned in row2col direction (drive
#   /ROW high, read /COL high) for the diode forward direction to
#   match: current flows /ROW (anode) → switch → /COL (cathode →
#   input).
#
#   ⚠️ Earlier diagnoses incorrectly claimed main was reversed and
#   recommended reflowing the thumb diodes to "match" — DO NOT follow
#   that path. The correct configuration is:
#       row2col = true on both [split.*.matrix] sections (set below)
#       All diodes installed per silkscreen, both halves.
#   If you reflow thumb diodes anode-on-/COL while main stays per-
#   silkscreen, you create a MIXED matrix that no single RMK scan
#   direction can serve.
#
# Column ordering: both halves currently use natural col_pins order,
# matching the older build that demonstrated a working Space on SW5.
# That means keymap (3, 0) drives /COL0 = P1.12 = SW2 (inner thumb)
# and (3, 3) drives /COL3 = P1.15 = SW5 (outer thumb). Phantom slots
# (no PCB switch on /COL4 row 3) sit at (3, 4) and (3, 9). The main
# letter rows therefore land mirrored on the unified 4x10 layout, but
# that is fine while we still need physical key registration to be
# easy to verify per column. See the matrix comments below.
# ROW/COL nets are shared between main and thumb boards via J1.

[keyboard]
name = "kobu"
product_name = "kobu"
vendor_id = 0x4b4f
product_id = 0x4259
manufacturer = "s-katada"
# Seeed XIAO nRF52840 BLE — enables the nrf52840 chip defaults in RMK.
board = "XIAO BLE"
usb_enable = true

[layout]
rows = 4
cols = 10
layers = 7
# 38-key 4×10 split (phantom thumb slots at (3,0) and (3,9)). Keymap ported
# position-by-position from KobitoKey_QWERTY (ZMK source-of-truth) — see
# ../KobitoKey_QWERTY/config/KobitoKey.keymap. The kobu PCB has 4 thumbs per
# side vs KobitoKey's 3. After the outward thumb shift the base-layer cluster
# is BS at the XIAO直下 (innermost) thumb on each half, with the source thumb
# functions moved one slot outward (see the per-thumb listing above row 3).
#
# ZMK LANG2 / LANG1 → RMK Language2 / Language1 (HID 0x91 / 0x90). These are
# the actual 英数 / かな keys on macOS JIS. The previous port used
# International5 / International4 (HID 0x8B / 0x8A = Muhenkan/Henkan) which
# macOS does NOT treat as 英数/かな without external help (Karabiner). See
# rmk-types-0.2.2/src/keycode.rs:283–284 for the RMK definitions.
keymap = [
    # Layer 0 — Mac / default (ZMK default_layer)
    [
        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
        ["A", "S", "D", "F", "G", "H", "J", "K", "L", "MT(Semicolon, LGui|LShift, FH)"],
        ["Z", "X", "C", "V", "B", "N", "M", "Comma", "Dot", "MT(Slash, LGui|LCtrl, FH)"],
        # Thumb row, layer 0. LEFT cols are reversed so keymap col 4 = /COL0 =
        # XIAO直下 (innermost) and col 1 = /COL3 = outer edge; RIGHT cols are
        # natural so col 5 = /COL0 = 直下 and col 8 = /COL3 = outer edge. cols 0
        # and 9 are phantom (no switch). Per the user request the whole cluster
        # was shifted OUTWARD on both halves and the 直下 key on each half is now
        # plain Backspace (previously the OUTER edge was Backspace):
        #   LEFT  (XIAO直下 → 外側): BS, 英数/Shift, Ctrl, BS/Cmd
        #   RIGHT (XIAO直下 → 外側): BS, Esc/Alt, Space/LT(2), Enter/LT(3)
        # The 直下-adjacent LEFT thumb is MT(Language2, LShift): tap = 英数
        # (Language2 = 英数 = English input on macOS JIS), hold = LShift — per
        # the user's request to make this thumb Shift / English (was Language1
        # = かな).
        # NOTE: the momentary thumb overrides on layers 1/2/3 (英数↔かな pair,
        # Win/Linux modifiers) still sit at their old columns and so no longer
        # line up with these shifted base-layer thumbs — shift them too if that
        # cross-layer alignment is wanted.
        ["No", "MT(Backspace, LGui, FH)", "LCtrl", "MT(Language2, LShift, FH)", "Backspace", "Backspace", "MT(Escape, LAlt, FH)", "LT(2, Space, FH)", "LT(3, Enter, FH)", "No"],
    ],
    # Layer 1 — Win/Linux overlay (ZMK layer1)
    [
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "MT(Semicolon, LCtrl|LShift, FH)"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "MT(Slash, LCtrl|LAlt, FH)"],
        ["_", "_", "MT(Backspace, LAlt, FH)", "LT(5, LGui, FH)", "_", "MT(Escape, LGui, FH)", "_", "_", "_", "_"],
    ],
    # Layer 2 — numbers / symbols (ZMK layer2)
    [
        ["Kc1", "Kc2", "Kc3", "Kc4", "Kc5", "Kc6", "Kc7", "Kc8", "Kc9", "Kc0"],
        ["WM(Kc1, LShift)", "WM(Kc2, LShift)", "WM(Kc3, LShift)", "WM(Kc4, LShift)", "WM(Kc5, LShift)", "Left", "Down", "Up", "Right", "_"],
        ["WM(Kc6, LShift)", "WM(Kc7, LShift)", "WM(Kc8, LShift)", "WM(Kc9, LShift)", "WM(Kc0, LShift)", "No", "No", "No", "No", "_"],
        # Layer-2 language thumb = かな/Shift (Language1 = Japanese IME on). The
        # SAME physical thumb on the base layer is 英数 (Language2, Layer 0 col3):
        # so tap-on-base = English, hold-LT(2)+that-thumb = Japanese — per the
        # user's request to split the two (base English / layer-2 Japanese).
        ["_", "_", "_", "MT(Language1, LShift, FH)", "_", "_", "_", "_", "_", "_"],
    ],
    # Layer 3 — settings, media, BLE (ZMK layer3). Source &bt BT_SEL 0..3 →
    # kobu User0..User3; source &bt BT_CLR → User6. BT_SEL 4 at pos 4 is
    # dropped (kobu has only 4 BLE profiles — ble_profiles_num = 4). Source
    # positions left as `&none` stay "No" to match the original keymap; the
    # kobu User4/User5/User7 keycodes can be reattached via Vial.
    [
        ["User0", "User1", "User2", "User3", "No", "MediaPrevTrack", "MediaPlayPause", "MediaNextTrack", "AudioVolDown", "AudioVolUp"],
        ["F1", "F2", "F3", "F4", "F5", "F6", "F7", "F8", "F9", "F10"],
        ["TO(0)", "TG(1)", "No", "No", "User6", "F11", "F12", "F13", "No", "_"],
        ["_", "_", "_", "_", "_", "Delete", "_", "_", "_", "_"],
    ],
    # Layer 4 — mouse (ZMK layer4; trackball motion is separate). Source pos
    # 10 (mt LSHFT LG(LBKT) = tap Cmd+[, hold LShift) → TD(2), defined in
    # [behavior.morse] below since RMK MT cannot express tap=key+modifier.
    # Source pos 7 of row 0 is `mkp MB2` (apparent typo for MB3) — ported
    # verbatim per "正確に実装".
    [
        ["WM(LeftBracket, LGui|LShift)", "WM(RightBracket, LGui|LShift)", "No", "No", "No", "MouseBtn1", "MouseBtn2", "MouseBtn2", "MouseBtn3", "_"],
        # cols 2/3 (= left-hand D / F home keys): Tab + held LGui, so you can
        # cmd+tab app-switch WHILE mousing the right ball — hold LGui (F, index)
        # and tap Tab (D, middle) to cycle apps. KobitoKey reaches cmd+tab the
        # same way (a held Cmd thumb + Tab); the auto-mouse layer used to hijack
        # the thumbs so kobu couldn't, hence exposing held-Cmd + Tab here.
        ["TD(2)", "WM(RightBracket, LGui)", "Tab", "LGui", "No", "No", "No", "No", "No", "_"],
        ["LCtrl", "No", "WM(C, LGui)", "WM(V, LGui)", "No", "No", "No", "No", "No", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
    ],
    # Layer 5 — Emacs (ZMK layer5)
    [
        ["WM(Q, LCtrl)", "WM(W, LCtrl)", "End", "WM(R, LCtrl)", "WM(T, LCtrl)", "WM(Y, LCtrl)", "WM(U, LCtrl)", "WM(I, LCtrl)", "WM(O, LCtrl)", "Up"],
        ["TD(1)", "WM(S, LCtrl)", "Delete", "Right", "WM(G, LCtrl)", "Backspace", "WM(J, LCtrl)", "TD(0)", "WM(L, LCtrl)", "WM(Semicolon, LCtrl)"],
        ["WM(Z, LCtrl)", "WM(X, LCtrl)", "WM(C, LCtrl)", "WM(V, LCtrl)", "Left", "Down", "WM(M, LCtrl)", "WM(Comma, LCtrl)", "WM(Dot, LCtrl)", "WM(Quote, LCtrl)"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
    ],
    # Layer 6 — Neovim (ZMK layer6)
    [
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "LCtrl", "_", "_", "_", "_", "_", "_"],
    ],
]

# Combos — ported 1:1 from ZMK `key-positions`, resolved to keycodes via the
# source default_layer (RMK combos match on pressed keycodes, not on matrix
# positions). Chord output uses base keycodes; Shift produces the natural
# shifted symbol. Inverted morphs (`:` ↔ `;`, `|` ↔ `\`) live in
# [behavior.fork] below.
[behavior.combo]
timeout = "50ms"
combos = [
    { actions = ["Q", "W"], output = "Grave" },                          # combo_grave (pos 0,1)
    { actions = ["A", "S"], output = "Tab" },                            # combo_tab (pos 10,11)
    { actions = ["Y", "U"], output = "Backspace" },                      # combo_yu_bspc (pos 5,6)
    { actions = ["U", "I"], output = "Backslash" },                      # combo_pipe (pos 6,7) → fork to `|`
    { actions = ["I", "O"], output = "Minus" },                          # combo_minus (pos 7,8)
    { actions = ["O", "P"], output = "Equal" },                          # combo_plus (pos 8,9)
    { actions = ["J", "K"], output = "LeftBracket" },                    # combo_lbkt (pos 16,17)
    { actions = ["K", "L"], output = "RightBracket" },                   # combo_rbkt (pos 17,18)
    { actions = ["L", "Semicolon"], output = "Quote" },                  # combo_squote (pos 18,19)
    { actions = ["N", "M"], output = "Backspace" },                      # combo_bspc (pos 25,26)
    { actions = ["Comma", "Dot"], output = "Slash" },                    # combo_question (pos 27,28)
    { actions = ["D", "F"], output = "WM(No, LGui|LAlt)", layer = 0 },   # combo_cmd_alt (pos 12,13, Mac)
    { actions = ["D", "F"], output = "WM(No, LCtrl|LAlt)", layer = 1 },  # combo_ctrl_alt (pos 12,13, Win/Linux)
    { actions = ["S", "D"], output = "TG(6)", layer = 1 },               # combo_neovim_toggle (pos 11,12, Win/Linux)
    { actions = ["S", "D"], output = "TG(6)", layer = 6 },               # combo_neovim_toggle (pos 11,12, Neovim → back)
]

# Fork — ZMK mod-morph (colon/semicolon, pipe/backslash)
[behavior.fork]
forks = [
    { trigger = "Semicolon", negative_output = "WM(Semicolon, LShift)", positive_output = "Semicolon", match_any = "LShift|RShift" },
    { trigger = "Backslash", negative_output = "WM(Backslash, LShift)", positive_output = "Backslash", match_any = "LShift|RShift" },
]

[behavior.morse]
hold_on_other_press = true
hold_timeout = "200ms"
gap_timeout = "200ms"
morses = [
    { tap = "WM(K, LCtrl)", double_tap = "Macro(0)" },              # TD(0) = td_kill_line
    { tap = "Home", double_tap = "WM(A, LCtrl)" },                  # TD(1) = td_home_ctla
    { tap = "WM(LeftBracket, LGui)", hold = "LShift", profile = "FH" },  # TD(2) = mt LSHFT LG(LBKT) on layer 4
]

# `hold_timeout` = how long you hold an FH key (the LT layer-taps LT(2,Space)/
# LT(3,Enter) and the MT mod-taps) before a standalone hold registers as the
# hold action (layer / modifier). Bumped to 350 ms per the user: the layer was
# activating too quickly on a deliberate long-press, so this makes "press →
# layer active" clearly more deliberate (fewer accidental layer triggers).
# Release still drops the layer instantly (momentary, no timeout). Because
# `hold_on_other_press = true`, chording another key during the hold STILL
# activates the layer/mod immediately — so normal layer use (hold thumb, press a
# key) is unaffected; this longer timeout only governs the hold-ALONE timing.
#
# ⚠️ FLASH-STORED: hold_timeout/morse profiles are persisted to flash and
# re-read at boot, and rmk-0.8.2's build-hash auto-invalidation is disabled, so
# a PLAIN reflash keeps the OLD value. To apply this you MUST flash once with
# [storage] clear_layout=true (central-clearlayout.uf2 — wipes the stored
# keymap+behavior and rewrites from this file, KEEPS BLE bonds), then flash the
# normal central.uf2.
[behavior.morse.profiles]
FH = { hold_on_other_press = true, hold_timeout = "350ms", gap_timeout = "200ms" }

[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LShift" },
    { operation = "tap", keycode = "End" },
    { operation = "up", keycode = "LShift" },
    { operation = "delay", duration = "30ms" },
    { operation = "tap", keycode = "Delete" },
]

[ble]
enabled = true
# nRF52840 max is 8 dBm. Stronger advertising helps Mac discover the keyboard
# at the edge of the room; RMK's advertise path also requests +8 dBm.
default_tx_power = 8
# Battery sensing via XIAO nRF52840 BLE's internal voltage divider:
#   BAT+ pad → R10 (1 MΩ) → P0_31 (AIN7_BAT) → R11 (510 kΩ) → P0_14.
#   Reading P0_31 requires the divider path to be ENABLED, which is gated
#   by P0_14 LOW (HIGH disables the path AND exposes P0_31 to up to 3.6V,
#   risking damage). P0_14 is driven LOW by a persisted
#   `[[split.*.output]]` declaration below for each half.
#
# Divider ratio is **R11 / (R10 + R11) = 510 / 1510 ≈ 0.338**, not 1/2 —
# Seeed populates the XIAO BLE module with asymmetric resistors so the
# nominal LiPo range 3.0–4.2 V lands within the SAADC's 0–3.6 V window
# without the extra headroom 1M/1M would consume. Earlier kobu builds set
# measured=1, total=2 (= 0.5) which underreads the actual battery voltage
# by ~30 %: a fresh 4.0 V LiPo decodes as ~2.7 V, which the RMK formula
# clamps to 0 % and lights the central LED red even on a healthy charge.
# The values below match the XIAO BLE schematic measurement and let RMK's
# get_battery_percent map a 4.0 V LiPo to ~80 %, 4.2 V to 100 %.
battery_adc_pin = "P0_31"
adc_divider_measured = 510
adc_divider_total = 1510

# Power / DCDC — MUST match the XIAO nRF52840 BLE power topology, which is
# NORMAL voltage mode: VDD is tied to VDDH on the on-board 3.3 V rail and there
# is NO inductor on the high-voltage REG0 (VDDH→VDD / DCCH) stage.
#
# The authoritative Zephyr board the working ZMK/KobitoKey firmware ships
# (boards/seeed/xiao_ble/xiao_ble_common.dtsi) enables ONLY the second-stage
# REG1 DCDC and leaves REG0 in LDO, and never programs UICR.REGOUT0:
#     &reg0 { status = "okay"; };                              // REG0 stays LDO
#     &reg1 { regulator-initial-mode = <NRF5X_REG_MODE_DCDC>; }; // REG1 = DCDC
#
# An EARLIER kobu build set dcdc_reg0=true (→ embassy POWER.DCDCEN0=true,
# embassy-nrf-0.8 lib.rs:1079-1080) on a hunch that "DCDC helps RF". That drives
# the high-voltage REG0 converter with no external LC filter / no VDDH>VDD
# headroom, which per Nordic "renders the chip unusable" — a marginal, brownout-
# prone CORE supply that takes the device down under +8 dBm TX current spikes.
# Because it is the power rail (not BLE) it killed the keyboard on USB *and*
# wireless and made power-on intermittent. Setting dcdc_reg0=false stops
# DCDCEN0 from being enabled, leaving REG0 in LDO exactly like ZMK.
#
# NOTE on REGOUT0: rmk-macro 0.7.1 chip_init.rs:64,76 ALWAYS emits
# config.dcdc.reg0_voltage = Some(_3V3) for nrf52840 (it defaults the missing
# key to "3V3"), so we cannot make it None from this file. That is harmless:
# embassy only writes UICR.REGOUT0 + sys_reset() when the value CHANGES, and a
# prior build already programmed REGOUT0=3V3, so it is now a no-op. In NORMAL
# voltage mode (VDDH=VDD, DCDCEN0 off) REGOUT0 is not in the supply path anyway
# — ZMK leaves it at the erased default and works for the same reason.
[chip.nrf52840]
dcdc_reg0 = false
dcdc_reg1 = true

[split]
connection = "ble"

# Left half = central. Keys occupy cols 0..4 of the unified 4x10 layout.
[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
# Reverse order on the left half: keymap col 0 must be the outer pinky
# (Q / A / Z column), which is wired to /COL4 = P0.10. col_pins[4] then
# drives the inner-index column (/COL0 = P1.12 = T / G / B). This
# matches the canonical QWERTY layout under the unified 4x10 keymap.
# Right half stays natural (col 0 = inner Y) plus col_offset = 5.
col_pins = ["P0_10", "P1_15", "P1_14", "P1_13", "P1_12"]
row2col = true  # drive /ROW high, read /COL — required for per-silkscreen diodes (anode on /ROW)

# Battery-sense enable for the central half: P0_14 must be driven LOW
# permanently so the on-module BAT divider feeds P0_31 (see `[ble]` notes).
# With low_active = false and initial_state_active = false, the persisted
# output sits at Level::Low at boot and is never touched again.
# The XIAO's onboard R/G/B LED pins (P0_26 / P0_30 / P0_06) are NOT declared
# here as static outputs — `src/battery_led.rs` claims and animates them
# dynamically based on battery percentage.
[[split.central.output]]
pin = "P0_14"
low_active = false
initial_state_active = false

# LEFT-board trackball (PMW3610). Sits on the central MCU (= left half).
# Pin mapping is documented at the top of this file:
#   D0  P0_02 = SDIO  (shared MOSI/MISO bit-banged on a single line)
#   D1  P0_03 = SCLK
#   D2  P0_28 = MOTION (active-low IRQ) — INTENTIONALLY UNCONFIGURED below
#                so the driver polls continuously rather than gating reads on
#                the MOTION pin. Keeps the trackball alive even if MOTION
#                wiring/polarity is wrong, at the cost of always-on polling.
#   NFC1 P0_09 = NCS  (chip select)
# Uses the default Pmw3610Processor (emits MouseReport x/y) via the
# auto-generated entry — no custom processor or override.
[[split.central.input_device.pmw3610]]
name = "left"
cpi = 600
force_awake = true
# kobu: match ZMK CONFIG_PMW3610_SMART_ALGORITHM=y (set on BOTH halves in
# KobitoKey). Datasheet surface-tracking quality — read_motion toggles reg 0x32
# on the SHUTTER threshold so tracking stays reliable on glossy/marginal
# surfaces (fewer count dropouts that would read as micro-もっさり). Report
# cadence unaffected; cost is a few SPI bytes + an occasional reg write.
smart_mode = true

[split.central.input_device.pmw3610.spi]
instance = ""
sck = "P0_03"
mosi = "P0_02"
miso = ""
cs = "P0_09"

# Right half = peripheral 0. Keys occupy cols 5..9.
[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5

[split.peripheral.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
# Natural order: keymap col 5 (= central col 0 + col_offset) = inner index
# = COL0 wire = P1.12; keymap col 9 = pinky = COL4 wire = P0.10.
col_pins = ["P1_12", "P1_13", "P1_14", "P1_15", "P0_10"]
row2col = true  # drive /ROW high, read /COL — required for per-silkscreen diodes (anode on /ROW)

# The XIAO onboard R/G/B LED pins (P0_26 / P0_30 / P0_06) are NOT declared as
# static outputs here — `src/peripheral_led.rs` claims and animates them
# dynamically (boot battery colour → blue when connected → off; red on central
# disconnect), mirroring the central's `src/status_led.rs`. Leaving P0_30
# undeclared keeps it owned by the macro's `p` so the controller can claim it.
# The P0_14 battery-sense enable output below MUST stay (it gates the BAT
# divider feeding the ADC).

# Battery-sense enable for the peripheral half (see central side notes).
[[split.peripheral.output]]
pin = "P0_14"
low_active = false
initial_state_active = false

# RIGHT-board trackball (PMW3610). Sits on the peripheral MCU.
# Same pin map as the LEFT side — both XIAO boards are identical hardware.
# Like the LEFT side, MOTION is intentionally not configured (driver polls
# continuously) and force_awake disables power-saving.
#
# The peripheral emits Joystick(X,Y,_) events that are forwarded as
# SplitMessage::Event to the central. The central's processor chain in
# `src/central.rs` routes those untouched-X/Y events to PointerProcessor
# (= mouse motion), while central-local events are relabeled X→H, Y→V by
# AxisRelabel so they reach ScrollProcessor instead. See
# `src/trackball.rs`.
[[split.peripheral.input_device.pmw3610]]
name = "right"
cpi = 600
force_awake = true
# kobu: match ZMK CONFIG_PMW3610_SMART_ALGORITHM=y — this is the POINTER half
# (the right ball), the exact ball ZMK runs the smart algorithm on. See the
# left-half note above for the mechanism.
smart_mode = true

[split.peripheral.input_device.pmw3610.spi]
instance = ""
sck = "P0_03"
mosi = "P0_02"
miso = ""
cs = "P0_09"

[rmk]
split_peripherals_num = 1
ble_profiles_num = 4
combo_max_num = 16
morse_max_num = 4
macro_space_size = 256
fork_max_num = 8

# Vial / Web keymap editor wiring.
# Vial speaks USB Raw HID (vendor usage page 0xFF60), so it's only reachable
# when central is plugged in via USB. BLE-only sessions cannot edit keymap.
# See README "Vial usage" section and tracking issue #12 for upstream BLE
# editor support.
[host]
# `vial_enabled` defaults to true in RMK 0.8 but is declared explicitly so a
# future default change can't silently disable Vial.
vial_enabled = true
# Physical (row, col) chord required to authorize keymap mutations from Vial.
# LEFT col_pins are reversed, so keymap col 0 = /COL4 wire = physical outer
# pinky on the LEFT half (= Q key). RIGHT col_pins are natural, so col 9 =
# /COL4 wire = physical outer pinky on the RIGHT half (= P key). Pressing
# both outer-pinkies simultaneously is virtually impossible during normal
# typing, which keeps Vial locked unless explicitly invoked.
#
# These are MATRIX positions in the 4x10 unified layout, NOT logical
# keycodes — relabeling Q or P in Vial does not change the unlock chord.
unlock_keys = [[0, 0], [0, 9]]

# Persistent flash storage for keymap, bonds, and Vial state.
#
# RMK 0.8's nrf52840 default places storage at 0xA0000..0xC0000 (128 KiB).
# We pin both fields explicitly so a default change upstream cannot move
# our region under us and orphan existing flash data.
#
# Flash layout (matches `memory.x` — keep in sync if either side changes):
#   0x000000..0x001000 (   4 KiB)  MBR
#   0x001000..0x0A0000 ( 636 KiB)  app code (linker-managed, declared in memory.x)
#   0x0A0000..0x0C0000 ( 128 KiB)  RMK storage (this section)
#   0x0C0000..0x0F4000 ( 208 KiB)  unused / bootloader settings
#   0x0F4000..0x100000 (  48 KiB)  Adafruit UF2 bootloader
#
# `clear_layout` and `clear_storage` stay false in normal builds. To
# factory-reset keymap (preserving BLE bonds) flip clear_layout=true,
# flash once, then flip back. To wipe bonds too use clear_storage=true.
#
# If macOS still does not list "kobu" after flashing this firmware, an
# older build may have stored USB-priority in flash (RMK #157). Either
# press Layer-3 "Switch Output" once while on USB, or flash once with
# clear_storage=true (wipes bonds) then set it back to false.
[storage]
enabled = true
start_addr = 0xA0000
num_sectors = 32
clear_layout = false
clear_storage = false
