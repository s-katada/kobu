# kobitokey-o-oyayubi firmware configuration.
#
# Hardware: split keyboard with two XIAO nRF52840 BLE modules (one on each
# thumb-unit PCB). Each side has a 4x5 scan matrix covering 15 main-unit
# switches (rows 0..2) and 4 thumb-unit switches on row 3 at COL0..COL3.
# Row 3 x COL4 has no switch wired on the PCB. The thumb unit's fifth
# silk-labeled switch (SW1) is an MSK-12D19 slide switch acting as the
# physical power cutoff, not a matrix key.
#
# Pin assignments below are derived from the KiCad schematic/PCB for the
# thumb unit. Important: the COL nets are not in XIAO D10..D7 order. The PCB
# connects the logical matrix nets as:
#   D0  (P0_02, pin 1)  -> SDIO   (trackball, bidirectional data)
#   D1  (P0_03, pin 2)  -> SCLK   (trackball clock)
#   D2  (P0_28, pin 3)  -> MOTION (trackball IRQ, active low)
#   D3  (P0_29, pin 4)  -> ROW0
#   D4  (P0_04, pin 5)  -> ROW1
#   D5  (P0_05, pin 6)  -> ROW2
#   D6  (P1_11, pin 7)  -> ROW3
#   D7  (P1_12, pin 8)  -> COL0
#   D8  (P1_13, pin 9)  -> COL1
#   D9  (P1_14, pin 10) -> COL2
#   D10 (P1_15, pin 11) -> COL3
#   NFC2(P0_10, pin 22) -> COL4  (back-side pad, NFC disabled in firmware)
#   NFC1(P0_09, pin 21) -> NCS   (trackball chip-select, back-side pad)
#   USER_LED_G(P0_30)   -> boot indicator LED (common anode, LOW = on)
# Diode direction:
#   The KiCad schematic and netlist place the diode anode on the ROW net
#   and the cathode on the switch (toward COL). Following that strictly
#   would require row2col = true. Empirically, however, the boards we
#   have on hand behave as col2row (anode-on-COL): with row2col = true
#   the entire matrix is dead, while the RMK default (col2row) at least
#   registers some keys. This matches the sister project KobitoKey_QWERTY,
#   which is wired the same physical way and uses col2row in ZMK. So we
#   leave row2col unset (= col2row = drive cols, read rows). If you ever
#   build with diodes flipped to match the schematic, set row2col = true
#   on both [split.*.matrix] sections.
#
# Column ordering differs between halves. On the left half COL0 is the
# inner index (T column) and COL4 is the outer pinky (Q column); on the
# right half COL0 is the inner index (Y column) and COL4 is the outer
# pinky (P column). To get a unified 4x10 layout where keymap col 0 is
# the leftmost pinky, the LEFT col_pins are declared in reverse so that
# col_pins[0] = COL4 wire = P0.10, col_pins[4] = COL0 wire = P1.12.
# RIGHT keeps the natural order (col_pins[0] = COL0 wire = inner index,
# col_pins[4] = COL4 wire = outer pinky) plus col_offset = 5.
# Consequently the row 3 phantom (no-switch) slots are (3, 0) and (3, 9)
# (both pinky columns), and the 4 thumb keys per side land on cols 1..4
# (left) / 5..8 (right).
# ROW/COL nets are shared between main and thumb boards via J1.

[keyboard]
name = "kobitokey-o-oyayubi"
product_name = "kobitokey-o-oyayubi"
vendor_id = 0x4b4f
product_id = 0x4259
manufacturer = "s-katada"
chip = "nrf52840"
usb_enable = true

[layout]
rows = 4
cols = 10
layers = 4
# Layout is a 38-key 4x10 split. Left half occupies cols 0..4, right half 5..9.
# Row 0..2 are the 3x5 main-unit keys on each side. Row 3 has 4 thumb keys
# per side on cols 1..4 (left) / 5..8 (right). The phantom (no-switch)
# slots on row 3 are (3, 0) and (3, 9) — both are the outer pinky columns
# where the PCB has no thumb switch. See the [split.*.matrix] notes for
# why LEFT col_pins are reversed.
keymap = [
    [
        ["Q",    "W",    "E",    "R",    "T",         "Y",    "U",    "I",    "O",    "P"],
        ["A",    "S",    "D",    "F",    "G",         "H",    "J",    "K",    "L",    "Semicolon"],
        ["Z",    "X",    "C",    "V",    "B",         "N",    "M",    "Comma","Dot",  "Slash"],
        # Thumb keys remapped to A..H so each physical thumb key types a
        # distinct letter for diagnosis. Phantom slots (3,0) (3,9) are the
        # pinky columns with no PCB switch. Left thumb 1..4 (outer->inner)
        # = A B C D, right thumb 5..8 (inner->outer) = E F G H. Restore
        # modifiers/Space/Enter once all 8 thumb switches are confirmed.
        ["No",   "A",    "B",    "C",    "D",         "E",    "F",    "G",    "H",   "No"],
    ],
    [
        ["Kc1",  "Kc2",  "Kc3",  "Kc4",  "Kc5",       "Kc6",  "Kc7",  "Kc8",  "Kc9",  "Kc0"],
        ["Minus","Equal","LeftBracket","RightBracket","Backslash",  "Grave","Quote","No","No","No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    [
        ["F1",   "F2",   "F3",   "F4",   "F5",        "F6",   "F7",   "F8",   "F9",   "F10"],
        ["Home", "PageUp","PageDown","End","Insert",  "Left", "Down", "Up",   "Right","Delete"],
        ["F11",  "F12",  "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    [
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
]

[ble]
enabled = true

[split]
connection = "ble"

# Left half = central. Keys occupy cols 0..4 of the unified 4x10 layout.
[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
# Reverse order: keymap col 0 = pinky drives COL4 wire = P0.10.
col_pins = ["P0_10", "P1_15", "P1_14", "P1_13", "P1_12"]
# row2col = true  # uncomment if diodes are populated to match schematic

# Seeed XIAO nRF52840's onboard RGB user LED is common anode:
# low_active + initial_state_active turns it on as soon as RMK initializes GPIO.
[[split.central.output]]
pin = "P0_30"
low_active = true
initial_state_active = true

# Right half = peripheral 0. Keys occupy cols 5..9.
[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5

[split.peripheral.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
# Natural order: keymap col 5 (= central col 0 + col_offset) = inner index
# = COL0 wire = P1.12; keymap col 9 = pinky = COL4 wire = P0.10.
col_pins = ["P1_12", "P1_13", "P1_14", "P1_15", "P0_10"]
# row2col = true  # uncomment if diodes are populated to match schematic

[[split.peripheral.output]]
pin = "P0_30"
low_active = true
initial_state_active = true

[rmk]
split_peripherals_num = 1
ble_profiles_num = 4
combo_max_num = 16

[storage]
