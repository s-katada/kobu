# kobitokey-o-oyayubi firmware configuration.
#
# Hardware: split keyboard with two XIAO nRF52840 BLE modules (one on each
# thumb-unit PCB). Each side has a 4x5 scan matrix covering 15 main-unit
# switches (rows 0..2) and 4 thumb-unit switches on row 3 at COL0..COL3.
# Row 3 x COL4 has no switch wired on the PCB. The thumb unit's fifth
# silk-labeled switch (SW1) is an MSK-12D19 slide switch acting as the
# physical power cutoff, not a matrix key.
#
# Pin assignments below are derived from the KiCad schematic/PCB for the
# thumb unit. Important: the COL nets are not in XIAO D10..D7 order. The PCB
# connects the logical matrix nets as:
#   D0  (P0_02, pin 1)  -> SDIO   (trackball, bidirectional data)
#   D1  (P0_03, pin 2)  -> SCLK   (trackball clock)
#   D2  (P0_28, pin 3)  -> MOTION (trackball IRQ, active low)
#   D3  (P0_29, pin 4)  -> ROW0
#   D4  (P0_04, pin 5)  -> ROW1
#   D5  (P0_05, pin 6)  -> ROW2
#   D6  (P1_11, pin 7)  -> ROW3
#   D7  (P1_12, pin 8)  -> COL0
#   D8  (P1_13, pin 9)  -> COL1
#   D9  (P1_14, pin 10) -> COL2
#   D10 (P1_15, pin 11) -> COL3
#   NFC2(P0_10, pin 22) -> COL4  (back-side pad, NFC disabled in firmware)
#   NFC1(P0_09, pin 21) -> NCS   (trackball chip-select, back-side pad)
#   USER_LED_G(P0_30)   -> boot indicator LED (common anode, LOW = on)
# Diode direction is col2row, so RMK scans columns as outputs and rows as
# inputs. ROW/COL nets are shared between main and thumb boards via J1.

[keyboard]
name = "kobitokey-o-oyayubi"
product_name = "kobitokey-o-oyayubi"
vendor_id = 0x4b4f
product_id = 0x4259
manufacturer = "s-katada"
chip = "nrf52840"
usb_enable = true

[layout]
rows = 4
cols = 10
layers = 4
# Layout is a 38-key 4x10 split. Left half occupies cols 0..4, right half 5..9.
# Row 0..2 are the 3x5 main-unit keys on each side; row 3 has 4 thumb keys
# per side on cols 0..3 (left) / 5..8 (right). Cols 4 and 9 of row 3 have
# no switch on the PCB, so the keymap entries there are "No" and never fire.
keymap = [
    [
        ["Q",    "W",    "E",    "R",    "T",         "Y",    "U",    "I",    "O",    "P"],
        ["A",    "S",    "D",    "F",    "G",         "H",    "J",    "K",    "L",    "Semicolon"],
        ["Z",    "X",    "C",    "V",    "B",         "N",    "M",    "Comma","Dot",  "Slash"],
        ["LCtrl","LAlt", "MO(2)", "Space","No",        "Enter","MO(1)","RShift","RAlt","No"],
    ],
    [
        ["Kc1",  "Kc2",  "Kc3",  "Kc4",  "Kc5",       "Kc6",  "Kc7",  "Kc8",  "Kc9",  "Kc0"],
        ["Minus","Equal","LeftBracket","RightBracket","Backslash",  "Grave","Quote","No","No","No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    [
        ["F1",   "F2",   "F3",   "F4",   "F5",        "F6",   "F7",   "F8",   "F9",   "F10"],
        ["Home", "PageUp","PageDown","End","Insert",  "Left", "Down", "Up",   "Right","Delete"],
        ["F11",  "F12",  "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    [
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
]

[ble]
enabled = true

[split]
connection = "ble"

# Left half = central. Keys occupy cols 0..4 of the unified 4x10 layout.
[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
col_pins = ["P1_12", "P1_13", "P1_14", "P1_15", "P0_10"]

# Seeed XIAO nRF52840's onboard RGB user LED is common anode:
# low_active + initial_state_active turns it on as soon as RMK initializes GPIO.
[[split.central.output]]
pin = "P0_30"
low_active = true
initial_state_active = true

# Right half = peripheral 0. Keys occupy cols 5..9.
[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5

[split.peripheral.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
col_pins = ["P1_12", "P1_13", "P1_14", "P1_15", "P0_10"]

[[split.peripheral.output]]
pin = "P0_30"
low_active = true
initial_state_active = true

[rmk]
split_peripherals_num = 1
ble_profiles_num = 4
combo_max_num = 16

[storage]
