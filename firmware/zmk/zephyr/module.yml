# Registers firmware/zmk/ as a ZMK/Zephyr module providing BOTH the custom
# `kobu` shield AND the (vendored, patched) PMW3610 trackball driver.
#
# zmk-nix (nix/zmk/keyboard.nix) passes -DZMK_EXTRA_MODULES=<src root> when a
# `zephyr/module.yml` exists at the SOURCE ROOT (= firmware/zmk/), so this one
# module is how the build discovers everything below it. ZMK v0.3's
# app/CMakeLists.txt does NOT derive a board root from ZMK_CONFIG, so the shield
# is only found via `board_root: config`.
#
#   board_root: config                       -> config/boards/shields/kobu (shield)
#   cmake/kconfig: modules/zmk-pmw3610-driver -> compile + Kconfig the vendored
#                                                PMW3610 driver (patched to POLL
#                                                over SPI; kobu's MOTION/P0_28
#                                                line is unreliable so the stock
#                                                IRQ-only driver never fires —
#                                                see modules/zmk-pmw3610-driver
#                                                and config/.../kobu_*.conf
#                                                CONFIG_PMW3610_POLL_INTERVAL_MS).
#   dts_root: modules/zmk-pmw3610-driver      -> the pixart,pmw3610 binding.
#
# The PMW3610 driver is vendored here (not fetched from badjeff via west)
# precisely so the polling patch can live in-repo; west.yml therefore no longer
# lists the badjeff project.
build:
  cmake: modules/zmk-pmw3610-driver
  kconfig: modules/zmk-pmw3610-driver/Kconfig
  settings:
    board_root: config
    dts_root: modules/zmk-pmw3610-driver
