# kobu LEFT half = central. Self-contained Kconfig (ZMK reads this shield conf
# automatically). Values mirror KobitoKey_left.conf, adjusted to kobu (cpi via
# devicetree, RGB layer colors per firmware/rmk/src/status_led.rs, no INVERT_X).

# --- Pointing / mouse / trackball ---
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# PMW3610 trackball (left = scroll ball). cpi is set in the devicetree node
# (600). Smart algorithm + 8ms report interval match the RMK firmware (which
# replicates ZMK's REPORT_INTERVAL_MIN=8 / SMART_ALGORITHM). No driver-level X
# invert: kobu handles direction in the input-processor chain (RMK default
# scroll_invert_x=false).
CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_Y=n
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REPORT_INTERVAL_MIN=8
# PURE IRQ (0), exactly like the proven KobitoKey LEFT scroll ball. A report_data
# -based poll at ANY interval > REPORT_INTERVAL_MIN (8 ms) FREEZES slow scroll:
# report_data shares function-static dx/dy/last_smp_time, and its purge
# (pmw3610.c: `if (now - last_smp_time >= 8ms) dx=dy=0`) zeroes partially-
# accumulated SLOW-roll counts on every poll tick before they emit (250 ms >> 8 ms;
# even 10 ms > 8 ms — which is why the old 10 ms poll also lost slow rolls). FAST
# rolls reach threshold within one sub-8 ms IRQ burst, so only SLOW scroll dies —
# exactly the "ゆっくり動かすと固まる" symptom. Pure IRQ has a SINGLE report_data
# caller, so slow accumulation survives (KobitoKey proves this).
# The force-awake RUN-mode re-assert that the poll used to provide now lives in a
# DEDICATED pmw3610_reassert_work (pmw3610.c, every 500 ms, unconditional) that
# calls set_performance() WITHOUT report_data — so it pins RUN (no REST-drift
# "scroll dies, revive by moving the other ball") with NO purge race. Do NOT set
# this > 0 to "add a watchdog"; the watchdog is the dedicated reassert_work.
CONFIG_PMW3610_POLL_INTERVAL_MS=0
# kobu: the LEFT sensor's 3-wire SDIO read is flaky at power-up and can return
# 0xFF garbage, failing the product-id/self-test init step (USB-log confirmed).
# Give the sensor extra settle time before the init sequence (driver also retries
# init from scratch — see modules/zmk-pmw3610-driver pmw3610_async_init).
CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=100
# Spike reject: drop single-sample deltas > ±90 raw counts. A partial flaky-SPI
# read (corrupted XY_H nibble) decodes to ±256..±2048 and the un-clamped scroll
# scaler turns it into a sudden "gyun" jump; a real roll never exceeds 90/sample
# (RMK's SCROLL_MAX_UNITS×SCROLL_STEP cap). LEFT (scroll) only — the RIGHT pointer
# leaves this unset so fast cursor flicks aren't capped.
CONFIG_PMW3610_MAX_DELTA=90

# NFC pins (P0_09 CS, P0_10 col) used as GPIO.
CONFIG_NFCT_PINS_AS_GPIOS=y

# --- BLE ---
CONFIG_ZMK_BLE=y
# No deep sleep (per user: battery is not a concern, keep the board + trackball
# always responsive). The PMW3610 is also kept out of its rest modes by
# `force-awake` in the overlay, so the scroll ball never has to "wake up".
CONFIG_ZMK_SLEEP=n
# Battery: XIAO internal divider on P0_31 (board-native). Central also proxies +
# fetches the peripheral's level so the host sees both halves.
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Host BLE connection tuning (kobu's RMK build.rs replicates exactly these
# KobitoKey values): 7.5ms..15ms interval (MIN_INT=6, MAX_INT=12), no slave
# latency skipping, 2000ms supervision timeout, +8 dBm TX.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=200
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Split (peripheral <-> central) link: do not skip connection events (low relay
# latency for the forwarded pointer).
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0

# --- ZMK Studio (USB keymap editor, the ZMK analogue of kobu's Vial/web editor;
#     central only — split.nix applies the studio snippet to the central part).
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# --- Onboard RGB LED status widget (rgbled_adapter shield) ---
# Battery thresholds match firmware/rmk/src/status_led.rs (green >60, then yellow,
# red <=20; critical kept low for the blink warning). Layer colors match
# status_led.rs::layer_color: 1=blue,2=green,3=cyan,4=magenta/purple,
# 5=yellow,6=white (widget color codes: 1=R 2=G 3=Y 4=B 5=M 6=C 7=W).
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_INTERVAL_MS=1000
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=60
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=7
