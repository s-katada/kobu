# kobu RIGHT half = peripheral. Mirrors KobitoKey_right.conf, adjusted to kobu.
# The RGB LED widget (battery boot color + connection status) is enabled by the
# rgbled_adapter shield's own defconfig; layer colors are central-only so this
# half just needs battery reporting + TX power.

# --- Pointing / mouse / trackball ---
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# PMW3610 trackball (right = pointer ball). cpi set in devicetree (600; 1.5x
# gain applied in the split input-processor chain). No driver-level X invert:
# Y-invert is done by the input-processor (INPUT_TRANSFORM_Y_INVERT).
CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_Y=n
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REPORT_INTERVAL_MIN=8

# NFC pins (P0_09 CS, P0_10 col) used as GPIO.
CONFIG_NFCT_PINS_AS_GPIOS=y

# --- BLE ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
