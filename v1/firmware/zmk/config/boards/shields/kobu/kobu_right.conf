# kobu RIGHT half = peripheral. Mirrors KobitoKey_right.conf, adjusted to kobu.
# The RGB LED widget (battery boot color + connection status) is enabled by the
# rgbled_adapter shield's own defconfig; layer colors are central-only so this
# half just needs battery reporting + TX power.

# --- Pointing / mouse / trackball ---
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# PMW3610 trackball (right = pointer ball). cpi set in devicetree (600; 1.5x
# gain applied in the split input-processor chain). No driver-level X invert:
# Y-invert is done by the input-processor (INPUT_TRANSFORM_Y_INVERT).
CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_Y=n
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REPORT_INTERVAL_MIN=8
# kobu poll patch: poll motion over SPI every 10ms regardless of the MOTION IRQ
# (unreliable on the kobu PCB; RMK polls). The IRQ path stays active, so the
# right ball keeps working as before plus gains MOTION-independent robustness.
CONFIG_PMW3610_POLL_INTERVAL_MS=10
# kobu: cap per-sample delta to kill the flaky-SPI "cursor runaway". A corrupted
# wake-from-idle read flips the 12-bit sign bit and decodes to ±256..±2048 raw
# counts; uncapped and 1.5x-gained, that flings the cursor across the screen
# ("使うのをやめて再開するとき暴走"). 200 rejects that garbage (>=256) while
# still allowing genuine fast flicks (rarely >150 counts / 10 ms poll at 600 cpi),
# so flick snappiness is preserved. (The LEFT scroll ball uses 90; the pointer
# gets more headroom on purpose.)
CONFIG_PMW3610_MAX_DELTA=200

# NFC pins (P0_09 CS, P0_10 col) used as GPIO.
CONFIG_NFCT_PINS_AS_GPIOS=y

# --- BLE ---
CONFIG_ZMK_BLE=y
# No deep sleep (per user; battery not a concern). force-awake keeps the pointer
# PMW3610 always tracking.
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
